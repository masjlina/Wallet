                        </div>
                    </div>


                    <div class="side-bar__bottom">
                        <div class="side-bar__item">

                            <p>Settings</p>
                        </div>
                        <div class="side-bar__item">
                            <img src="icons/out-door.svg" class="icon" alt="Logout">
                            <p>Logout</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="wrapper dashboard__wrapper">
            <div class="container dashboard__container">
                <div class="content dashboard-content">
                    <div class="dashboard__widget"></div>
                    <div class="dashboard__widget"></div>
                    <div class="dashboard__widget"></div>
                </div>
                <div class="content dashboard-content">
                    <div class="dashboard__widget"></div>
                    <div class="dashboard__widget"></div>
                </div>
            </div>
        </div>
    </div>
