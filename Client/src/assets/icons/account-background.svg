<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -10 920 500" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" role="img" aria-hidden="false">
    <defs>
        <radialGradient id="r1" cx="0.1" cy="0.4" r="0.9">
            <stop offset="0" stop-color="#ff6f6f"/>
            <stop offset="0.6" stop-color="#ff6f6f" stop-opacity="0.4"/>
            <stop offset="1" stop-color="#0000"/>
        </radialGradient>

        <radialGradient id="r2" cx="0.85" cy="0.16" r="0.9">
            <stop offset="0" stop-color="#d6a7ff"/>
            <stop offset="0.55" stop-color="#d6a7ff" stop-opacity="0.18"/>
            <stop offset="1" stop-color="#0000"/>
        </radialGradient>

        <radialGradient id="r3" cx="0.9" cy="0.86" r="0.8">
            <stop offset="0" stop-color="#7fb4ff"/>
            <stop offset="0.6" stop-color="#7fb4ff" stop-opacity="0.14"/>
            <stop offset="1" stop-color="#0000"/>
        </radialGradient>

        <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#f2f2f3"/>
            <stop offset="1" stop-color="#e6eefc"/>
        </linearGradient>

        <filter id="blurLarge" x="0" y="0" width="100%" height="100%">
            <feGaussianBlur stdDeviation="48"/>
        </filter>

        <filter id="f-drop" x="0" y="0" width="260%" height="260%">
            <feDropShadow dx="5" dy="10" stdDeviation="8" flood-color="#7763EA" flood-opacity="0.12"/>
        </filter>
    </defs>

    <!-- базовая карточка -->
    <rect x="0" y="0" width="900" height="480" rx="26" ry="26" fill="url(#base)" filter="url(#f-drop)"/>

    <!-- пятна, обрезанные по форме карточки -->
    <clipPath id="clipCard"><rect x="0" y="0" width="900" height="480" rx="26"/></clipPath>
    <g clip-path="url(#clipCard)" filter="url(#blurLarge)">
        <rect x="0" y="0" width="900" height="540" fill="url(#r1)" opacity="0.95"/>
        <rect x="0" y="0" width="900" height="540" fill="url(#r2)" opacity="0.9"/>
        <rect x="0" y="0" width="900" height="540" fill="url(#r3)" opacity="0.9"/>
    </g>

    <!-- лёгкая накладка для насыщенности -->
    <rect x="30" y="30" width="900" height="480" rx="26" fill="none" style="mix-blend-mode:soft-light; opacity:0.12; pointer-events:none;"/>
</svg>
