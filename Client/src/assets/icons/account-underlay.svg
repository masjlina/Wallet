<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -42 900 625" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" role="img" aria-label="rotated card">
    <defs>
        <linearGradient id="g-main" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#D39BFF"/>
            <stop offset="0.35" stop-color="#A6C9FF"/>
            <stop offset="0.7" stop-color="#9FD4FF"/>
            <stop offset="1" stop-color="#4B6BFF"/>
        </linearGradient>

        <linearGradient id="g-bottom" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#0000"/>
            <stop offset="1" stop-color="#2E64FF"/>
        </linearGradient>

        <radialGradient id="g-spot" cx="0.28" cy="0.18" r="0.6">
            <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.9"/>
            <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.15"/>
            <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
        </radialGradient>

        <filter id="f-blur" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="36"/>
        </filter>

        <filter id="f-drop" x="0" y="0" width="260%" height="260%">
            <feDropShadow dx="0" dy="13" stdDeviation="8" flood-color="#7763EA" flood-opacity="0.12"/>
        </filter>
    </defs>

    <!-- Поворот вокруг центра карточки (450,270) -->
    <g transform="rotate(-10 450 270)" filter="url(#f-drop)">
        <!-- сама карточка (ровно той же размерности как в первом SVG) -->
        <rect x="30" y="30" width="840" height="480" rx="26" ry="26" fill="url(#g-main)"/>

        <!-- overlay -->
        <rect x="30" y="30" width="840" height="480" rx="26" ry="26" fill="url(#g-bottom)" opacity="0.18" style="mix-blend-mode:overlay"/>

        <!-- пятна / блики внутри той же карточки -->
        <g clip-path="url(#clipCard2)">
            <!-- define clip here so circles stay inside card -->
            <clipPath id="clipCard2"><rect x="30" y="30" width="840" height="480" rx="26"/></clipPath>

            <circle cx="200" cy="120" r="180" fill="url(#g-spot)" filter="url(#f-blur)" opacity="0.9"/>
            <circle cx="660" cy="380" r="120" fill="#ffffff" filter="url(#f-blur)" opacity="0.06" />
        </g>
    </g>
</svg>

