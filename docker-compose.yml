services:
  db:
    image: postgres:16-alpine
    container_name: wallet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-Wallet}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - wallet_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Wallet"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wallet-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnStr: Host=db;Port=5432;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD};Database=${POSTGRES_DB:-Wallet};Include Error Detail=true
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGIN:-http://localhost}
      Authentication__Schemes__Bearer__ValidIssuer: ${JWT_VALID_ISSUER:-wallet-api}
      Authentication__Schemes__Bearer__ValidAudiences__0: ${JWT_VALID_AUDIENCE:-http://localhost}
      Authentication__Schemes__Bearer__SigningKeys__0__Value: ${JWT_SIGNING_KEY:?Set JWT_SIGNING_KEY}
    ports:
      - "5000:5000"

  client:
    build:
      context: ./Client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
    container_name: wallet-client
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  wallet_db_data:
